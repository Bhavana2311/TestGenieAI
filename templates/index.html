<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestGenie AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{
    background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #2563eb);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    color: white;
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
}

@keyframes gradientBG{
    0%{
        background-position: 0% 50%;
    }
    50%{
        background-position: 100% 50%;
    }
    100%{
        background-position: 0% 50%;
    }
}

.main-box{
    margin-top: 50px;
    background: rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 25px;
    backdrop-filter: blur(18px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.15);
}

textarea{

height:220px !important;

resize:none;

border-radius:15px !important;

padding:20px !important;

font-size:18px !important;

border:none !important;

background:
rgba(255,255,255,.12) !important;

color:white !important;

backdrop-filter:blur(10px);

box-shadow:
0 0 15px rgba(0,0,0,.2);
}
textarea::placeholder{

color:#d1d5db;
}

.btn-custom{
    background: linear-gradient(to right, #00c6ff, #0072ff);
    border: none;
    padding: 15px;
    font-size: 20px;
    font-weight: 600;
    border-radius: 12px;
    transition: 0.3s;
    color: white;
}

.btn-custom:hover{
    transform: scale(1.02);
    box-shadow: 0 0 20px rgba(0,198,255,0.5);
}

.output-box{
    margin-top: 20px;
    background: rgba(0,0,0,0.35);
    padding: 25px;
    border-radius: 18px;
    white-space: pre-wrap;
    line-height: 1.9;
    max-height: 500px;
    overflow-y: auto;
    border: 1px solid rgba(255,255,255,0.1);
}

.output-box::-webkit-scrollbar{
    width: 8px;
}

.output-box::-webkit-scrollbar-thumb{
    background: #00c6ff;
    border-radius: 10px;
}

.title{
    font-size: 60px;
    font-weight: 700;
    text-align: center;
}

.subtitle{
    text-align: center;
    color: #d1d5db;
    margin-bottom: 30px;
}

.sample-btn{
    margin: 5px;
    border-radius: 30px;
    padding: 10px 18px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: white;
    transition: 0.3s;
}

.sample-btn:hover{
    background: #00c6ff;
}
    </style>
</head>

<body>
    <div class="background-glow"></div>

<div class="container">
    <div class="main-box">
        <a href="/dashboard" class="btn btn-light mb-3">
⬅ Back to Dashboard
</a>


        <h1 class="title">🧠 TestGenie AI</h1>

<p class="subtitle">
    AI Powered Test Case Generation Agent <br>
    Powered by Gemini AI
</p>

        <div class="text-center mb-4">

    <button class="sample-btn" type="button"
    onclick="setSample('User Login System with Email and Password')">
        Login System
    </button>

    <button class="sample-btn" type="button"
    onclick="setSample('E-commerce Shopping Cart and Checkout')">
        Shopping Cart
    </button>

    <button class="sample-btn" type="button"
    onclick="setSample('Online Payment Gateway Integration')">
        Payment Gateway
    </button>

</div>

        <form method="POST">

            <textarea id="requirementInput"
class="form-control mt-4"
name="requirement"
placeholder="Enter your software requirement here..."
required>{{ requirement }}</textarea>

            <button id="generateBtn" class="btn btn-custom w-100 mt-4">

    <span id="btnText">Generate Test Cases</span>

    <span id="spinner"
    class="spinner-border ms-3"
    style="
    display:none;
    width: 1.5rem;
    height: 1.5rem;
    ">
    </span>

</button>
        </form>

        {% if output %}

        <div class="d-flex justify-content-between align-items-center mt-5">

    <h3>Generated Test Cases:</h3>

    <div>

        <button onclick="copyOutput()" class="btn btn-light">
            Copy Output
        </button>

        <form action="/download" method="POST" style="display:inline;">

            <input type="hidden" name="output" value="{{ output }}">
            <input type="hidden" name="requirement" value="{{ requirement }}">

            <button class="btn btn-success">
                Download
            </button>

        </form>
        <a onclick="downloadPDF()"
class="btn btn-danger ms-2">
    Download PDF
</a>
    </div>

</div>

        <div id="outputText" class="output-box">
    {{ output }}
</div>
        {% endif %}
        
    </div>
</div>
<script>

document.querySelector("form").addEventListener("submit", function(){

document.getElementById("btnText").innerText =
"Generating AI Test Cases...";

document.getElementById("spinner").style.display =
"inline-block";

});

function copyOutput(){

    let text = document.getElementById("outputText").innerText;

    navigator.clipboard.writeText(text);

    alert("Test Cases Copied!");

}

function setSample(text){

    document.getElementById("requirementInput").value = text;

}
function downloadPDF(){

    let text =
    document.getElementById("outputText").innerText;

    let requirement =
    document.getElementById("requirementInput").value;

    window.location.href =
    "/download_pdf?data=" +
    encodeURIComponent(text) +
    "&requirement=" +
    encodeURIComponent(requirement);

}

</script>

</body>
</html>
