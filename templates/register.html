<!DOCTYPE html>
<html>
<head>

<title>Register - TestGenie AI</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="card">

<div class="form-icon">🚀</div>

<h2>Create Account</h2>

<p class="form-subtitle">
Join TestGenie AI and automate software testing
</p>

<form method="POST">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Create Account
</button>

</form>

<br>

<center>

<a href="/login" class="btn">
Already Have Account?
</a>

</center>

</div>
<div class="footer">

© 2026 TestGenie AI |
AI Powered Software Testing Platform

</div>

</body>
</html>
